[build]
  publish = "."

[[redirects]]
  from = "/auth"
  to = "/.netlify/functions/oauth"
  status = 200

[[redirects]]
  from = "/callback"
  to = "/.netlify/functions/oauth"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
