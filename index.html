<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Barbara Yukhnjevich | Editorial, Print, Packaging & Digital Designer</title>
    <meta
      name="description"
      content="Portfolio of Barbara Yukhnjevich: editorial design, print, packaging, branding, Amazon creative and digital graphics."
    >
    <meta name="theme-color" content="#2F6D66">
    <meta property="og:title" content="Barbara Yukhnjevich | Designer">
    <meta
      property="og:description"
      content="Editorial precision for modern brands: print, packaging, branding, Amazon creative and digital design."
    >
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yuhnevich.com/">
    <link rel="canonical" href="https://yuhnevich.com/">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Golos+Text:wght@400;500;600&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <div class="progress" id="progress"></div>

    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="#top">Barbara Yukhnjevich</a>
        <button class="menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
          <span></span>
          <span></span>
        </button>
        <nav class="main-nav" aria-label="Primary navigation">
          <a href="#about" data-nav="about"></a>
          <a href="#services" data-nav="services"></a>
          <a href="#portfolio" data-nav="portfolio"></a>
          <a href="#process" data-nav="process"></a>
          <a href="#contact" data-nav="contact"></a>
        </nav>
        <div class="header-actions">
          <div class="lang-switch" aria-label="Language">
            <button type="button" data-lang="ru">RU</button>
            <button type="button" data-lang="en">EN</button>
          </div>
          <a class="button button-dark header-cta" href="#contact"></a>
        </div>
      </div>
    </header>

    <main>
      <section class="hero" id="top" data-section="top">
        <div class="grid-bg" aria-hidden="true"></div>
        <div class="soft-orbit" aria-hidden="true"></div>
        <div class="shell hero-grid">
          <div class="hero-copy">
            <p class="kicker"><span></span><strong id="heroKicker"></strong></p>
            <h1>
              <span id="heroH1a"></span>
              <em id="heroH1b"></em>
            </h1>
            <p class="hero-sub" id="heroSub"></p>
            <div class="hero-buttons">
              <a class="button button-dark" href="#contact" id="heroCta1"></a>
              <a class="button button-outline" href="#portfolio" id="heroCta2"></a>
            </div>
            <p class="hero-facts" id="heroFacts"></p>
          </div>

          <div class="hero-media" aria-label="Featured work">
            <a class="featured-frame" href="#portfolio">
              <figure class="image-cover">
                <img src="uploads/ilovepdf_images-extracted/img27.jpg" alt="" id="heroImageAlt">
                <figcaption>
                  <span id="heroFeatTag"></span>
                  <strong id="heroFeatTitle"></strong>
                </figcaption>
              </figure>
              <span class="arrow" aria-hidden="true">→</span>
            </a>
            <div class="hero-badge">
              <strong>120+</strong>
              <span id="heroBadge1"></span>
            </div>
            <figure class="supporting-frame">
              <img src="uploads/ilovepdf_images-extracted/img66.jpg" alt="">
              <figcaption>Packaging</figcaption>
            </figure>
          </div>
        </div>
        <div class="scroll-cue" aria-hidden="true">
          <span id="scrollCue"></span>
          <span>↓</span>
        </div>
      </section>

      <section class="section about" id="about" data-section="about">
        <div class="shell about-grid">
          <aside>
            <p class="section-label" id="aboutLabel"></p>
            <figure class="portrait">
              <img src="uploads/ilovepdf_images-extracted/img3.jpg" alt="Barbara Yukhnjevich portrait">
            </figure>
          </aside>
          <div>
            <h2 class="section-title reveal" id="aboutH2"></h2>
            <div class="about-copy reveal">
              <p id="aboutP1"></p>
              <p id="aboutP2"></p>
            </div>
            <div class="chips-area">
              <div>
                <p class="micro-label" id="aboutToolsLabel"></p>
                <div class="chips" id="tools"></div>
              </div>
              <div>
                <p class="micro-label" id="aboutValuesLabel"></p>
                <div class="chips chips-accent" id="values"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="section" id="services" data-section="services">
        <div class="shell">
          <div class="section-head">
            <h2 class="section-title reveal" id="servicesH2"></h2>
            <p class="section-label" id="servicesLabel"></p>
          </div>
          <div class="services-grid" id="servicesGrid"></div>
        </div>
      </section>

      <section class="section portfolio" id="portfolio" data-section="portfolio">
        <div class="shell">
          <div class="section-head">
            <h2 class="section-title reveal" id="workH2"></h2>
            <p class="section-label" id="workLabel"></p>
          </div>
          <div class="filters" id="filters" aria-label="Portfolio filters"></div>
          <div class="projects-grid" id="projectsGrid"></div>
          <p class="note" id="workNote"></p>
        </div>
      </section>

      <section class="numbers" aria-label="Numbers">
        <div class="shell stats-grid" id="statsGrid"></div>
      </section>

      <section class="section process" id="process" data-section="process">
        <div class="shell">
          <div class="section-head">
            <h2 class="section-title reveal" id="processH2"></h2>
            <p class="section-label" id="processLabel"></p>
          </div>
          <div class="process-grid" id="processGrid"></div>
        </div>
      </section>

      <section class="collabs" aria-label="Selected collaborations">
        <div class="shell collab-head">
          <p class="section-label reveal" id="collabLabel"></p>
        </div>
        <div class="marquee" aria-hidden="true">
          <div id="collabTrack"></div>
        </div>
      </section>

      <section class="contact" id="contact" data-section="contact">
        <div class="contact-glow" aria-hidden="true"></div>
        <div class="shell contact-inner">
          <h2 class="reveal" id="ctaH2"></h2>
          <p id="ctaSub"></p>
          <div class="contact-actions">
            <a class="button button-light" id="ctaButton" href="#"></a>
            <span id="emailLine"></span>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="shell">
        <div class="footer-grid">
          <div>
            <strong class="footer-brand">Barbara Yukhnjevich</strong>
            <p id="footerTagline"></p>
          </div>
          <nav class="footer-nav" aria-label="Footer navigation">
            <a href="#about" data-footer-nav="about"></a>
            <a href="#services" data-footer-nav="services"></a>
            <a href="#portfolio" data-footer-nav="portfolio"></a>
            <a href="#contact" data-footer-nav="contact"></a>
          </nav>
          <div class="footer-contact">
            <a id="footerEmail" href="#"></a>
            <span id="footerSocial"></span>
            <span id="footerRemote"></span>
          </div>
        </div>
        <div class="footer-bottom">
          <span>© 2026 Barbara Yukhnjevich</span>
          <span>Editorial · Print · Packaging · Amazon · Digital</span>
        </div>
      </div>
    </footer>

    <div class="lightbox" id="lightbox" hidden>
      <button class="lightbox-close" type="button" aria-label="Close">×</button>
      <figure>
        <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="">
        <figcaption>
          <strong></strong>
          <span></span>
        </figcaption>
      </figure>
    </div>

    <script src="assets/content.js"></script>
    <script src="assets/script.js"></script>
  </body>
</html>
